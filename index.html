<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KamalFPS Gaming</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Orbitron',sans-serif;
background:#05050b;
color:white;
overflow-x:hidden;
}

/* RGB glow following mouse */

#glow{
position:fixed;
width:600px;
height:600px;
background:radial-gradient(circle,#ff003c,#7b2cff,#00e5ff);
filter:blur(180px);
pointer-events:none;
z-index:-1;
opacity:.4;
}

/* header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
background:#0c0c14;
}

.logo{
font-size:26px;
color:#ff003c;
font-weight:bold;
}

nav a{
margin-left:25px;
text-decoration:none;
color:white;
opacity:.8;
}

/* hero */

.hero{
text-align:center;
padding:140px 20px;
}

.hero h1{
font-size:64px;
margin-bottom:20px;
}

.hero span{
color:#00e5ff;
}

.hero p{
opacity:.7;
margin-bottom:30px;
}

.btn{
padding:16px 36px;
border-radius:40px;
background:#ff003c;
color:white;
text-decoration:none;
display:inline-block;
}

/* videos */

.section{
padding:90px 10%;
text-align:center;
}

.section h2{
margin-bottom:40px;
}

.videos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.video-card{
background:#0f0f18;
padding:10px;
border-radius:10px;
}

iframe{
width:100%;
height:200px;
border:none;
border-radius:10px;
}

/* subscriber goal */

.goal-container{
width:100%;
max-width:500px;
margin:auto;
background:#111;
border-radius:30px;
overflow:hidden;
}

.goal-bar{
height:25px;
background:linear-gradient(90deg,#ff003c,#00e5ff);
width:0%;
}

/* aim trainer */

#gameArea{
width:100%;
max-width:500px;
height:350px;
margin:auto;
background:#111;
position:relative;
border-radius:12px;
}

.target{
width:50px;
height:50px;
background:red;
border-radius:50%;
position:absolute;
cursor:pointer;
}

footer{
padding:40px;
text-align:center;
opacity:.6;
}

/* canvas background */

#bgCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

</style>

</head>

<body>

<canvas id="bgCanvas"></canvas>
<div id="glow"></div>

<header>

<div class="logo">KAMALFPS</div>

<nav>
<a href="#">Home</a>
<a href="#videos">Videos</a>
<a href="#goal">Goal</a>
<a href="#game">Aim Trainer</a>
</nav>

</header>

<section class="hero">

<h1>DOMINATE THE <span>FPS</span></h1>

<p>Clutch plays. Elite aim. Pro gameplay.</p>

<a class="btn" href="https://youtube.com/@kamalfps" target="_blank">
SUBSCRIBE
</a>

</section>

<section class="section" id="videos">

<h2>LATEST UPLOADS</h2>

<div class="videos" id="videoContainer">
Loading videos...
</div>

</section>

<section class="section" id="goal">

<h2>SUBSCRIBER GOAL</h2>

<div class="goal-container">
<div class="goal-bar" id="goalBar"></div>
</div>

<p id="goalText" style="margin-top:15px"></p>

</section>

<section class="section" id="game">

<h2>FPS AIM TRAINER</h2>

<p>Click the red targets!</p>

<div id="gameArea"></div>

<p>Score: <span id="score">0</span></p>

</section>

<footer>

© 2026 KamalFPS

</footer>

<script>

/* RGB glow follow mouse */

document.addEventListener("mousemove",e=>{
const glow=document.getElementById("glow");
glow.style.left=e.clientX-300+"px";
glow.style.top=e.clientY-300+"px";
});

/* 3D particle background */

const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*1
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.y+=p.speed;

if(p.y>canvas.height)p.y=0;

ctx.fillStyle="#00e5ff";
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(animate);
}

animate();

/* load youtube videos */

fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UC")
.then(res=>res.json())
.then(data=>{
const container=document.getElementById("videoContainer");
container.innerHTML="";

data.items.slice(0,3).forEach(video=>{
const id=video.link.split("v=")[1];

container.innerHTML+=`
<div class="video-card">
<iframe src="https://www.youtube.com/embed/${id}"></iframe>
</div>
`;
});
});

/* subscriber goal */

let subs=630; // change manually
let goal=1000;

let percent=(subs/goal)*100;

document.getElementById("goalBar").style.width=percent+"%";

document.getElementById("goalText").innerText=
subs+" / "+goal+" Subscribers";

/* FPS aim trainer */

let score=0;
const gameArea=document.getElementById("gameArea");

function spawnTarget(){

const target=document.createElement("div");
target.className="target";

target.style.left=Math.random()*450+"px";
target.style.top=Math.random()*300+"px";

target.onclick=()=>{
score++;
document.getElementById("score").innerText=score;
target.remove();
spawnTarget();
};

gameArea.appendChild(target);
}

spawnTarget();

</script>

</body>
</html>
