<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KamalFPS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Orbitron',sans-serif;
background:#05050b;
color:white;
overflow-x:hidden;
}

/* mouse particle canvas */

#trailCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

/* header */

header{
display:flex;
justify-content:space-between;
padding:20px 8%;
background:#0e0e16;
}

.logo{
color:#ff003c;
font-size:26px;
font-weight:bold;
}

nav a{
margin-left:20px;
color:white;
text-decoration:none;
opacity:.8;
}

/* hero */

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero span{color:#00e5ff}

/* 3D controller */

.controller{
width:220px;
height:220px;
margin:50px auto;
transform-style:preserve-3d;
animation:spin 12s linear infinite;
}

.controller img{
width:100%;
}

@keyframes spin{
0%{transform:rotateY(0deg) rotateX(10deg)}
100%{transform:rotateY(360deg) rotateX(10deg)}
}

/* videos */

.section{
padding:80px 10%;
text-align:center;
}

.videos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.video-card{
background:#0f0f18;
padding:10px;
border-radius:10px;
}

iframe{
width:100%;
height:200px;
border:none;
border-radius:8px;
}

/* subscriber counter */

.counter{
margin-top:20px;
font-size:30px;
color:#00e5ff;
}

/* aim trainer */

#gameArea{
width:100%;
max-width:500px;
height:350px;
margin:30px auto;
background:#111;
position:relative;
border-radius:12px;
}

.target{
width:45px;
height:45px;
background:red;
border-radius:50%;
position:absolute;
cursor:pointer;
}

footer{
padding:40px;
text-align:center;
opacity:.6;
}

</style>
</head>

<body>

<canvas id="trailCanvas"></canvas>

<header>

<div class="logo">KAMALFPS</div>

<nav>
<a href="#">Home</a>
<a href="#videos">Videos</a>
<a href="#stats">Stats</a>
<a href="#game">Aim Trainer</a>
</nav>

</header>

<section class="hero">

<h1>DOMINATE THE <span>FPS</span></h1>

<p>Elite aim • insane reflexes • clutch gameplay</p>

<div class="controller">
<img src="<img src="https://cdn-icons-png.flaticon.com/512/686/686589.png">">
</div>

<a href="https://youtube.com/@kamalfps" style="
padding:16px 36px;
background:#ff003c;
border-radius:30px;
text-decoration:none;
color:white;
display:inline-block;
">SUBSCRIBE</a>

</section>

<section class="section" id="stats">

<h2>LIVE SUBSCRIBERS</h2>

<iframe
src="https://socialcounts.org/youtube-live-subscriber-count/kamalfps/embed"
width="320"
height="120"
frameborder="0">
</iframe>

</section>

<section class="section" id="videos">

<h2>LATEST UPLOADS</h2>

<div id="videoContainer" class="videos">
Loading...
</div>

</section>

<section class="section" id="game">

<h2>FPS AIM TRAINER</h2>

<div id="gameArea"></div>

<p>Score: <span id="score">0</span></p>

</section>

<footer>

© 2026 KamalFPS

</footer>

<script>

/* mouse particle trail */

const canvas=document.getElementById("trailCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

document.addEventListener("mousemove",e=>{
particles.push({x:e.clientX,y:e.clientY,size:6})
})

function animateTrail(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

ctx.fillStyle="rgba(0,229,255,0.7)"
ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

p.size-=0.2

if(p.size<=0)particles.splice(i,1)

})

requestAnimationFrame(animateTrail)
}

animateTrail()

/* fetch youtube videos */

fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UCp1M9YZk-p90")
.then(res=>res.json())
.then(data=>{

const container=document.getElementById("videoContainer")
container.innerHTML=""

data.items.slice(0,3).forEach(video=>{

const id=video.link.split("v=")[1]

container.innerHTML+=`
<div class="video-card">
<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
</div>
`

})

})

/* aim trainer */

let score=0
const gameArea=document.getElementById("gameArea")

function spawn(){

const target=document.createElement("div")
target.className="target"

target.style.left=Math.random()*450+"px"
target.style.top=Math.random()*300+"px"

target.onclick=()=>{

score++
document.getElementById("score").innerText=score
target.remove()

spawn()

}

gameArea.appendChild(target)

}

spawn()

</script>

</body>
</html>
